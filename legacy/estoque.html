<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <title>Dashboard Sandrini - Estoque</title>
  <link href="style.css" rel="stylesheet"/>
</head>
<body class="estoque-page">
  <div class="loader" id="loader">Carregando...</div>
  <a class="logo-home-text" href="index.html">← Voltar para Home</a>
  <div class="menu-toggle">☰</div>
  <nav class="sidebar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="vendas.html">Vendas</a></li>
      <li><a href="estoque.html">Estoque</a></li>
      <li><a href="cobertura.html">Cobertura de Estoque</a></li>
      <li><a href="produto.html">Produto</a></li>
      <li><a href="reposicao.html">Reposição a Caminho</a></li>
    </ul>
  </nav>
  <main class="container">
    <header class="header-main">
      <h1>Dashboard de Estoque</h1>
    </header>
    <section class="card" id="estoque">
      <h2>Estoque Agrupado</h2>
      <button class="btn-padrao" id="btn-exportar" style="float: right; margin-top: -32px;">Exportar Dados</button>
      <div class="filters">
        <label>Local:</label>
        <select id="filtro-local-estoque"></select>

        <label>Marca:</label>
        <select id="filtro-marca-estoque"></select>

        <button id="btn-aplicar-estoque">Aplicar Filtro</button>
        <div class="totais">
          Total de Itens em Estoque: <strong id="total-estoque">0</strong>
        </div>
        <table class="styled-table" id="tabela-estoque">
          <thead>
            <tr>
              <th data-col="descricao">Descrição ⇅</th>
              <th data-col="total">Estoque ⇅</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="estoque.js"></script>
  <script>
    document.body.classList.add("fade-in");
    window.addEventListener("load", () => {
      document.getElementById("loader")?.classList.add("hidden");
    });
  </script>
</body>
</html>
