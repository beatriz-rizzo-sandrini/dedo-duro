name: Sincronizar Banco (Dedo Duro)

on:
  schedule:
    # Executa a cada hora no minuto zero (ex: 10:00, 11:00, 12:00)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Permite rodar manualmente clicando num botão no GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências do backend
        working-directory: ./backend
        run: npm install

      - name: Rodar sincronização
        working-directory: ./backend
        run: node sincronizador_supabase.js --once
